<html lang="en">
	<head>

		<script>

			function gtag(){dataLayer.push(arguments);}

			gtag('config', 'G-EMK1J68N8T');

    	<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
			 * {
			 box-sizing: border-box;
			 }
			 body {
			 margin: 0;
			 font-family: Arial;
			 font-size: 17px;
			 }
			 #myVideo {
			 position: fixed;
			 right: 0;
			 bottom: 0;
			 min-width: 100%; 
			 min-height: 100%;
			 }
			 .content {
			 position: fixed;
			 bottom: 2em;
			 background: rgba(0, 0, 0, 0.5);
			 color: #f1f1f1;
			 width: 100%;
			 padding: 20px;
			 }
			 #myBtn {
			 width: 200px;
			 font-size: 18px;
			 padding: 10px;
			 border: none;
			 background: #000;
			 color: #fff;
			 cursor: pointer;
			 }
			 #myBtn:hover {
			 background: #ddd;
			 color: black;
			 }
		 
			.backgroundvideo
			{
				pointer-events: none; /* Ensure the elemnt it stops people from being able to right-click on the video to pause, play, etc.*/
			}
		 
		</style>
	</head>
	
    <body>
		<div class="container">
    
          <video autoplay muted loop id="myVideo" class = "backgroundvideo">
             <source src="/video/slidingDownWaterfall.mp4" type="video/mp4">
             Your browser does not support HTML5 video and background video can not be displayed.
          </video>
          <div class="content">
             <h1>Gallery</h1>
             <p>Collection of images depicting my life.</p>
             <button id="myBtn" onclick="myFunction()">Pause Background</button>
          </div>
          <script>
             var video = document.getElementById("myVideo");
             var btn = document.getElementById("myBtn");
             
             function myFunction() {
               if (video.paused) {
                 video.play();
                 btn.innerHTML = "Pause Background";
               } else {
                 video.pause();
                 btn.innerHTML = "Play Background";
               }
             }
          </script>
         </div>	
   </body>
</html>
