<!DOCTYPE HTML> 																<!--  declaration defines this document to be HTML5. -->
<html lang="en">																<!--  class: Refers to a class in a style sheet. Can specify one or more elements.  lang: is the document language.-->
	<head>  																	<!--  Contains meta information about the document. -->
		<title>Resources</title>												<!--  Title for the page. -->
        <link rel="stylesheet" href="/css/style.css">							<!--  Style sheet to use. -->
        <script src="/code/menuToggle.js"></script>								<!--  Some JavaSceipt functions the page uses. -->
        <meta name="viewport" content="width=device-width, initial-scale=1">
	</head>
    
    
	<body>

        <!--  Side bar menu items -->
        <div id="mySidenav" class="sidenav">
          <a href="#">Machine Learning</a>
          <a href="#">Neurel Networks</a>
          <a href="#">Contact</a>
        </div>

        <div id="main">
        <!-- NOTE: All page contents must go in this div section.
          <h2>Contents of page</h2>
          
          <!--  Click on the element below to open the side navigation menu and pushes body content to the right. 
			NOTE: &#9776;   is a image with three lines. Aka 'Hamburger Menu'. Can create this alternatively using the CSS style sheets and defining
            how 'bar1, bar2, bar3' should look like when the menu is open or closed.
            Added a black see-through background-color to body when the sidenav is opened. 
          -->
          <span style="cursor:pointer" onclick="toggleNav();">
        <div class="container" onclick="myFunction(this)">
          <div class="bar1"></div>
          <div class="bar2"></div>
          <div class="bar3"></div>
        </div>
        </span>        
        </div>
       
       	         
           
    </body>
